name: Deploy Intelligent Learning Platform (Production)

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js for frontend build
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup backend directory on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/python.sicsglobal.com/intelligent-learning
            sudo chown -R $USER:$USER /var/www/python.sicsglobal.com/intelligent-learning
            sudo chmod -R 755 /var/www/python.sicsglobal.com/intelligent-learning
            sudo mkdir -p /var/www/python.sicsglobal.com/intelligent-learning/uploads
            sudo chown -R $USER:$USER /var/www/python.sicsglobal.com/intelligent-learning/uploads
            sudo mkdir -p /var/www/python.sicsglobal.com/intelligent-learning/backups
            sudo chown -R $USER:$USER /var/www/python.sicsglobal.com/intelligent-learning/backups
            sudo mkdir -p /var/www/python.sicsglobal.com/intelligent-learning/mongo_backups
            sudo chown -R $USER:$USER /var/www/python.sicsglobal.com/intelligent-learning/mongo_backups

      - name: Create backup on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/python.sicsglobal.com/intelligent-learning
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

            if [ -d "current" ]; then
              tar -czf backups/backup_$TIMESTAMP.tar.gz current/ uploads/ .env

              if docker ps | grep ilp_mongo_prod; then
                docker exec ilp_mongo_prod mongodump --archive --gzip --db ilp_db > mongo_backups/mongo_backup_$TIMESTAMP.gz
              fi
            fi

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Copy backend and frontend files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: |
            ./backend/
            ./frontend/dist/
          target: "/var/www/python.sicsglobal.com/intelligent-learning/current/"
          strip_components: 1
          overwrite: true

      - name: Deploy with Docker
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/python.sicsglobal.com/intelligent-learning/current

            cat > .env <<EOF
            MONGODB_URI=mongodb://mongo:27017/ilp_db
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=1d
            NODE_ENV=production
            CORS_ORIGIN=https://python.sicsglobal.com
            UPLOAD_DIR=/app/uploads/
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            STATIC_PATH=/app/static
            EOF

            chmod 600 .env

            # Stop existing containers
            docker compose -p ilp_prod -f docker-compose.prod.yml down --remove-orphans || true

            # Build and start containers
            if docker compose -p ilp_prod -f docker-compose.prod.yml up -d --build; then

              # Wait for services to be healthy
              for i in {1..24}; do
                BACKEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' ilp_prod 2>/dev/null || echo "starting")
                MONGO_STATUS=$(docker inspect --format='{{.State.Status}}' ilp_mongo_prod 2>/dev/null || echo "starting")

                if [ "$BACKEND_STATUS" = "healthy" ] && [ "$MONGO_STATUS" = "running" ]; then
                  break
                fi

                sleep 5
              done

              # Health check
              if ! curl --max-time 10 --retry 3 --retry-delay 5 --fail http://localhost:8025/api/health; then
                echo "Health check failed!"
                docker logs ilp_prod
                exit 1
              fi

              # Verify frontend is served
              if ! curl --max-time 10 --fail http://localhost:8025/intelligent-learning/; then
                echo "Frontend not served!"
                exit 1
              fi

              # Cleanup old backups (keep last 5)
              cd /var/www/python.sicsglobal.com/intelligent-learning/backups
              ls -t | tail -n +6 | xargs rm -f -- 2>/dev/null || true

              cd /var/www/python.sicsglobal.com/intelligent-learning/mongo_backups
              ls -t | tail -n +6 | xargs rm -f -- 2>/dev/null || true

              echo "✅ Deployment successful!"

            else
              echo "❌ Deployment failed! Rolling back..."

              cd /var/www/python.sicsglobal.com/intelligent-learning
              docker compose -p ilp_prod -f current/docker-compose.prod.yml || true

              LATEST_BACKUP=$(ls -t backups/ | head -1)
              LATEST_MONGO_BACKUP=$(ls -t mongo_backups/ | head -1)

              if [ -n "$LATEST_BACKUP" ]; then
                rm -rf current/*
                tar -xzf backups/$LATEST_BACKUP -C .

                if [ -n "$LATEST_MONGO_BACKUP" ]; then
                  docker compose -p ilp_prod -f current/docker-compose.prod.yml up -d mongo
                  sleep 10
                  docker exec -i ilp_mongo_prod mongorestore --archive --gzip --drop < mongo_backups/$LATEST_MONGO_BACKUP
                fi

                cd current
                docker compose -p ilp_prod -f docker-compose.prod.yml up -d

                if ! curl --max-time 10 --fail http://localhost:8025/api/health; then
                  echo "❌ Rollback failed!"
                  exit 1
                fi
              else
                echo "❌ No backup available for rollback!"
                exit 1
              fi
            fi

            # Show container status
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            # Final health check
            curl -I http://localhost:8025/api/health
