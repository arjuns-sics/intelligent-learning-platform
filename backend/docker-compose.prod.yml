name: ilp_backend_prod

services:
  ilp_backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      - PORT=8025
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/ilp_db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - UPLOAD_DIR=/app/uploads/
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - STATIC_PATH=/app/static
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static:ro
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8025/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - ilp_network

  mongo:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ ping: 1 }).ok' --quiet | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - ilp_network

volumes:
  mongo_data:

networks:
  ilp_network:
    driver: bridge
